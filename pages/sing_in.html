<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180" href="../images/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../images/favicon/favicon-16x16.png">
    <link rel="manifest" href="../images/favicon/site.webmanifest">
    <link rel="mask-icon" href="../images/favicon/safari-pinned-tab.svg" color="#5bbad5">
    <meta name="msapplication-TileColor" content="#2d89ef">
    <meta name="theme-color" content="#ffffff">
    <link rel="stylesheet" href="../css/register.css">
    <title>Goodness_Volunteering | Register_Sing up</title>
</head>

<body>
    <!--Main-->
    <main>
        <div class="header container">
            <a class="logo" href="../index.html"> <img class="logo" src="../images/favicon/android-chrome-192x192.png"
                    alt="logo" width="50px"></a>
            <p class="register-paragraph">Goodness_Volunteering</p>
        </div>
        <section class="register">
            <div class="register__container container">
                <h2 class="title_up">Sing in</h2>
                <form class="register_form" action="https://echo.htmlacademy.ru/courses" method="post">
                    <label for="label_firstame"></label>
                    <input class="input_firstname" id="label_firstame" type="text" name="Firstame" required
                        placeholder="Enter your username">
                    <label for="label_email"></label>
                    <input class="input_email" id="label_email" type="email" name="Email" required
                        placeholder="Enter your email here">
                    <label for="label_password"></label>
                    <input class="input_password" id="label_email" type="password" name="Password" required
                        placeholder="Enter your password">
                    <button class="input_password">
                        Subscribe
                    </button>
                </form>
                <div class="singin_main">
                    <a style="text-transform: capitalize; margin-top: 7px;" href="register.html" class="singin">go
                        back</a>
                </div>
            </div>
        </section>
    </main>
    <script src="../js/app.js"></script>
</body>

</html>
